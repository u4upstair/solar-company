<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07CCEA" />
      <stop offset="100%" stop-color="#CEFE49" />
    </linearGradient>
    <style>
      @keyframes pulse {
        0% { transform: scale(0.9); opacity: 0.8; }
        50% { transform: scale(1.1); opacity: 1; }
        100% { transform: scale(0.9); opacity: 0.8; }
      }
      .anim {
        transform-origin: center;
        animation: pulse 2s infinite ease-in-out;
      }
    </style>
  </defs>
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#g)" stroke-width="8" class="anim"/>
  <path d="M50 20 L60 45 L85 45 L65 60 L75 85 L50 70 L25 85 L35 60 L15 45 L40 45 Z" fill="url(#g)" class="anim"/>
</svg>
